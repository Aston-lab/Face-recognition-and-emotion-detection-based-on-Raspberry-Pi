<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Console Modal Preview</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #eef3fb;
        --text: #18202e;
        --muted: #697488;
        --line: #dde4f0;
        --blue: #6f9bed;
        --blue-deep: #315fd4;
        --green: #168a4a;
        --red: #b42318;
        --surface: rgba(255, 255, 255, 0.78);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 24px;
        background:
          radial-gradient(circle at 15% 8%, rgba(111, 155, 237, 0.35), transparent 30%),
          radial-gradient(circle at 85% 10%, rgba(57, 167, 109, 0.16), transparent 28%),
          linear-gradient(180deg, #f8fbff, var(--bg));
        color: var(--text);
        font-family: "Aptos", "Microsoft YaHei", Arial, sans-serif;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .page-ghost {
        position: fixed;
        inset: 0;
        display: grid;
        grid-template-columns: repeat(4, minmax(160px, 1fr));
        gap: 18px;
        padding: 38px;
        opacity: 0.28;
        filter: blur(2px);
        pointer-events: none;
      }

      .ghost-card {
        height: 170px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.8);
        box-shadow: 0 18px 50px rgba(24, 32, 46, 0.08);
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(29, 36, 52, 0.28);
        backdrop-filter: blur(9px);
        -webkit-backdrop-filter: blur(9px);
      }

      .console-modal {
        position: relative;
        width: min(980px, calc(100vw - 40px));
        min-height: 620px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.78);
        border-radius: 34px;
        background:
          radial-gradient(circle at 28% 14%, rgba(111, 155, 237, 0.14), transparent 30%),
          linear-gradient(145deg, rgba(255, 255, 255, 0.88), rgba(248, 251, 255, 0.72));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.86),
          0 28px 80px rgba(24, 32, 46, 0.22);
        backdrop-filter: blur(24px) saturate(1.2);
        -webkit-backdrop-filter: blur(24px) saturate(1.2);
      }

      .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 28px 32px 0;
      }

      .modal-title-block p {
        margin: 8px 0 0;
        color: var(--muted);
        font-size: 15px;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 34px;
        font-weight: 900;
      }

      .close-button {
        display: inline-grid;
        place-items: center;
        min-width: 78px;
        height: 42px;
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.7);
        color: var(--text);
        cursor: pointer;
        font-weight: 800;
      }

      .modal-body {
        display: grid;
        grid-template-columns: minmax(360px, 1fr) minmax(320px, 0.78fr);
        gap: 26px;
        padding: 28px 32px 32px;
      }

      .search-stage {
        display: grid;
        align-content: center;
        justify-items: center;
        min-height: 500px;
        border-radius: 30px;
        background:
          radial-gradient(circle at 50% 38%, rgba(111, 155, 237, 0.18), transparent 24%),
          radial-gradient(circle at 50% 38%, rgba(111, 155, 237, 0.1), transparent 42%),
          rgba(255, 255, 255, 0.46);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      }

      .radar {
        position: relative;
        width: min(360px, 100%);
        aspect-ratio: 1;
        border-radius: 50%;
        background:
          conic-gradient(from 18deg, rgba(111, 155, 237, 0.28), rgba(111, 155, 237, 0.02), rgba(111, 155, 237, 0.2)),
          radial-gradient(circle, rgba(111, 155, 237, 0.11) 0 36%, transparent 37%),
          radial-gradient(circle, transparent 0 58%, rgba(111, 155, 237, 0.08) 59% 60%, transparent 61%);
      }

      .radar::before,
      .radar::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 0;
        width: 1px;
        height: 100%;
        background: rgba(111, 155, 237, 0.18);
      }

      .radar::after {
        transform: rotate(90deg);
      }

      .node {
        position: absolute;
        display: grid;
        place-items: center;
        border: 1px solid rgba(225, 231, 242, 0.92);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 18px 42px rgba(24, 32, 46, 0.12);
      }

      .node.main {
        left: 50%;
        top: 50%;
        width: 128px;
        height: 128px;
        transform: translate(-50%, -50%);
      }

      .node.left {
        left: 16px;
        top: 118px;
        width: 82px;
        height: 82px;
      }

      .node.top {
        right: 32px;
        top: 32px;
        width: 96px;
        height: 96px;
      }

      .node.right {
        right: 52px;
        bottom: 66px;
        width: 74px;
        height: 74px;
      }

      .esp-icon {
        position: relative;
        width: 62px;
        height: 78px;
        border: 2px solid #ccd6e8;
        border-radius: 18px;
        background: linear-gradient(180deg, #f6f8fc, #d5ddeb);
      }

      .esp-icon::before {
        content: "";
        position: absolute;
        left: 50%;
        top: -20px;
        width: 2px;
        height: 22px;
        transform: translateX(-50%);
        background: #80612c;
      }

      .esp-icon::after {
        content: "";
        position: absolute;
        inset: 16px 12px;
        border-radius: 10px;
        background:
          radial-gradient(circle at 28% 28%, #fff 0 6px, transparent 7px),
          radial-gradient(circle at 72% 28%, #fff 0 6px, transparent 7px),
          radial-gradient(circle at 28% 72%, #fff 0 6px, transparent 7px),
          radial-gradient(circle at 72% 72%, #fff 0 6px, transparent 7px),
          linear-gradient(145deg, #29336f, #7c86ee);
      }

      .mini-camera {
        width: 46px;
        height: 54px;
        border-radius: 22px;
        background: radial-gradient(circle at 65% 32%, #111827 0 9px, #ffffff 10px 18px, #d9e0ec 19px);
        box-shadow: inset 0 -10px 18px rgba(24, 32, 46, 0.13);
      }

      .mini-wifi {
        width: 54px;
        height: 54px;
        border: 4px solid #89aafd;
        border-radius: 50%;
        background: conic-gradient(#89aafd, #ffffff, #89aafd);
      }

      .mini-temp {
        width: 25px;
        height: 50px;
        border-radius: 20px;
        background: linear-gradient(180deg, #85a7ff, #f5db81 50%, #ff7a7a);
      }

      .stage-title {
        margin-top: 20px;
        font-size: 28px;
        font-weight: 900;
        text-align: center;
      }

      .stage-copy {
        width: min(360px, 90%);
        margin-top: 8px;
        color: var(--muted);
        line-height: 1.55;
        text-align: center;
      }

      .control-panel {
        display: grid;
        align-content: start;
        gap: 16px;
      }

      .panel-card {
        padding: 18px;
        border: 1px solid rgba(220, 228, 242, 0.92);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.74);
        box-shadow: 0 14px 34px rgba(24, 32, 46, 0.07);
      }

      .panel-card h2 {
        font-size: 18px;
        font-weight: 900;
      }

      .field {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }

      .field label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 800;
      }

      select,
      input {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--line);
        border-radius: 14px;
        outline: none;
        background: rgba(255, 255, 255, 0.86);
        color: var(--text);
        padding: 0 14px;
        font-size: 15px;
        font-weight: 800;
      }

      select:focus,
      input:focus {
        border-color: rgba(111, 155, 237, 0.8);
        box-shadow: 0 0 0 4px rgba(111, 155, 237, 0.14);
      }

      .device-status-list {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }

      .device-row {
        display: grid;
        grid-template-columns: 42px 1fr auto;
        align-items: center;
        gap: 12px;
        min-height: 58px;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #ffffff;
      }

      .row-icon {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border-radius: 14px;
        background: #eef4ff;
        color: var(--blue-deep);
        font-weight: 900;
      }

      .row-title {
        font-weight: 900;
      }

      .row-subtitle {
        margin-top: 2px;
        color: var(--muted);
        font-size: 13px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        min-height: 30px;
        padding: 0 12px;
        border-radius: 999px;
        background: #edf8f2;
        color: var(--green);
        font-size: 13px;
        font-weight: 900;
      }

      .pill.warn {
        background: #edf4ff;
        color: var(--blue-deep);
      }

      .pill.stop {
        background: #fff1ef;
        color: var(--red);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .action-button {
        min-height: 48px;
        border: 0;
        border-radius: 16px;
        background: #eef2f8;
        color: #4c566f;
        cursor: pointer;
        font-weight: 900;
      }

      .action-button.primary {
        background: linear-gradient(135deg, #5d72ff, #8bb5ff);
        color: #ffffff;
        box-shadow: 0 14px 26px rgba(49, 95, 212, 0.18);
      }

      .action-button.stop {
        grid-column: 1 / -1;
      }

      .result-box {
        min-height: 76px;
        padding: 14px 16px;
        border-radius: 18px;
        background: #f7f9fd;
        color: var(--muted);
        line-height: 1.5;
      }

      @media (max-width: 820px) {
        .console-modal {
          min-height: auto;
        }

        .modal-body {
          grid-template-columns: 1fr;
        }

        .search-stage {
          min-height: 420px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page-ghost" aria-hidden="true">
      <div class="ghost-card"></div>
      <div class="ghost-card"></div>
      <div class="ghost-card"></div>
      <div class="ghost-card"></div>
    </div>
    <div class="modal-backdrop"></div>

    <section class="console-modal" role="dialog" aria-modal="true" aria-labelledby="console-title">
      <header class="modal-head">
        <div class="modal-title-block">
          <h1 id="console-title">控制台</h1>
          <p>连接 ESP32 并控制温湿度采集工作状态</p>
        </div>
        <button class="close-button" type="button">关闭</button>
      </header>

      <div class="modal-body">
        <section class="search-stage">
          <div class="radar" aria-hidden="true">
            <div class="node main"><div class="esp-icon"></div></div>
            <div class="node left"><div class="mini-camera"></div></div>
            <div class="node top"><div class="mini-wifi"></div></div>
            <div class="node right"><div class="mini-temp"></div></div>
          </div>
          <h2 class="stage-title" id="stage-title">Searching...</h2>
          <p class="stage-copy">请确认 ESP32 已上电并接入 Wi-Fi。连接成功后，可开始温湿度采集与上传。</p>
        </section>

        <aside class="control-panel">
          <section class="panel-card">
            <h2>设备连接</h2>
            <div class="field">
              <label for="device-select">选择设备</label>
              <select id="device-select">
                <option>esp32-01</option>
                <option>wifi-fall-rx</option>
                <option>visual-fall-detector</option>
              </select>
            </div>
            <div class="field">
              <label for="admin-token">Admin token</label>
              <input id="admin-token" type="password" value="••••••••••••" />
            </div>
          </section>

          <section class="panel-card">
            <h2>连接状态</h2>
            <div class="device-status-list">
              <div class="device-row">
                <span class="row-icon">●</span>
                <span>
                  <span class="row-title">ESP32 link</span>
                  <div class="row-subtitle" id="link-copy">Waiting for connection</div>
                </span>
                <span class="pill warn" id="link-pill">Ready</span>
              </div>
              <div class="device-row">
                <span class="row-icon">℃</span>
                <span>
                  <span class="row-title">Telemetry work</span>
                  <div class="row-subtitle" id="work-copy">Not collecting</div>
                </span>
                <span class="pill warn" id="work-pill">Standby</span>
              </div>
            </div>
          </section>

          <section class="panel-card">
            <div class="actions">
              <button class="action-button primary" type="button" data-action="connect">Connect</button>
              <button class="action-button primary" type="button" data-action="start">Start work</button>
              <button class="action-button stop" type="button" data-action="stop">Stop work</button>
            </div>
          </section>

          <section class="panel-card">
            <h2>执行结果</h2>
            <div class="result-box" id="result-box">Latest: no command sent yet.</div>
          </section>
        </aside>
      </div>
    </section>

    <script>
      const stageTitle = document.getElementById("stage-title");
      const deviceSelect = document.getElementById("device-select");
      const linkCopy = document.getElementById("link-copy");
      const workCopy = document.getElementById("work-copy");
      const linkPill = document.getElementById("link-pill");
      const workPill = document.getElementById("work-pill");
      const resultBox = document.getElementById("result-box");

      function setPill(element, text, mode) {
        element.textContent = text;
        element.className = `pill ${mode || ""}`.trim();
      }

      document.querySelectorAll("[data-action]").forEach((button) => {
        button.addEventListener("click", () => {
          const device = deviceSelect.value;
          const action = button.getAttribute("data-action");
          if (action === "connect") {
            stageTitle.textContent = "Connected";
            linkCopy.textContent = `${device} connected`;
            workCopy.textContent = "Ready to start collecting";
            setPill(linkPill, "Online", "");
            setPill(workPill, "Standby", "warn");
            resultBox.textContent = `Latest: connect · completed · ${device} is online.`;
          }
          if (action === "start") {
            stageTitle.textContent = "Working...";
            linkCopy.textContent = `${device} online`;
            workCopy.textContent = "Collecting temperature and humidity";
            setPill(linkPill, "Online", "");
            setPill(workPill, "Working", "");
            resultBox.textContent = `Latest: start_work · completed · ${device} is uploading telemetry.`;
          }
          if (action === "stop") {
            stageTitle.textContent = "Stopped";
            linkCopy.textContent = `${device} connected`;
            workCopy.textContent = "Collection stopped";
            setPill(linkPill, "Online", "");
            setPill(workPill, "Stopped", "stop");
            resultBox.textContent = `Latest: stop_work · completed · ${device} stopped telemetry upload.`;
          }
        });
      });
    </script>
  </body>
</html>

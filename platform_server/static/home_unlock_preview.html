<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ASDUN Smart Home</title>
    <style>
      :root {
        color-scheme: light;
        --page-bg: #f4f7fb;
        --text: #18202e;
        --muted: #657085;
        --rim: rgba(255, 255, 255, 0.42);
        --blue: #6b73ff;
        --blue-deep: #2458d3;
        --mint: #dff2eb;
        --cream: #f7f9fd;
        --ink: #201d1f;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        display: grid;
        place-items: center;
        min-height: 100vh;
        padding: 18px;
        background:
          radial-gradient(circle at 16% 10%, rgba(107, 124, 255, 0.22), transparent 32%),
          radial-gradient(circle at 86% 13%, rgba(57, 167, 109, 0.16), transparent 30%),
          radial-gradient(circle at 54% 98%, rgba(218, 209, 198, 0.28), transparent 36%),
          var(--page-bg);
        font-family: Poppins, "Aptos Display", "Century Gothic", "Microsoft YaHei", Arial, sans-serif;
        letter-spacing: 0;
      }

      button {
        font: inherit;
      }

      .phone {
        position: relative;
        width: min(386px, calc(100vw - 24px));
        aspect-ratio: 392 / 760;
        min-height: 626px;
        overflow: hidden;
        border: 4px solid rgba(255, 255, 255, 0.24);
        border-radius: 48px;
        background:
          radial-gradient(circle at 22% 7%, rgba(107, 124, 255, 0.22), transparent 30%),
          radial-gradient(circle at 82% 12%, rgba(57, 167, 109, 0.16), transparent 28%),
          radial-gradient(circle at 55% 70%, rgba(218, 209, 198, 0.24), transparent 36%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(248, 250, 254, 0.62));
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.88),
          inset 0 18px 38px rgba(255, 255, 255, 0.52),
          inset 0 -20px 42px rgba(209, 216, 230, 0.32),
          0 24px 62px rgba(24, 32, 46, 0.14),
          0 3px 0 rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(22px) saturate(1.2);
        -webkit-backdrop-filter: blur(22px) saturate(1.2);
      }

      .phone::before {
        content: "";
        position: absolute;
        inset: 13px;
        pointer-events: none;
        border-radius: 38px;
        background:
          linear-gradient(105deg, rgba(255, 255, 255, 0.58), transparent 18% 82%, rgba(255, 255, 255, 0.42)),
          radial-gradient(circle at 50% 8%, rgba(255, 255, 255, 0.62), transparent 34%);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.5),
          inset 0 24px 36px rgba(255, 255, 255, 0.36),
          inset 0 -38px 48px rgba(231, 236, 248, 0.38);
        mix-blend-mode: screen;
      }

      .phone::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        border-radius: 45px;
        background:
          linear-gradient(90deg, rgba(255, 255, 255, 0.58), transparent 5% 95%, rgba(255, 255, 255, 0.48)),
          linear-gradient(180deg, rgba(255, 255, 255, 0.26), transparent 18% 82%, rgba(255, 255, 255, 0.2)),
          radial-gradient(circle at 50% 95%, rgba(255, 255, 255, 0.38), transparent 34%);
      }

      .content {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-rows: minmax(362px, 1fr) auto auto;
        height: 100%;
        padding: 26px 24px 18px;
      }

      .art {
        align-self: end;
        width: 100%;
        min-height: 372px;
        margin-top: -6px;
      }

      .copy {
        margin-top: 0;
        text-align: center;
      }

      h1 {
        margin: 0;
        color: var(--text);
        font-size: clamp(39px, 9vw, 48px);
        font-weight: 500;
        line-height: 1.17;
        text-shadow: 0 8px 28px rgba(101, 112, 133, 0.16);
      }

      p {
        width: min(292px, 100%);
        margin: 14px auto 0;
        color: var(--muted);
        font-size: clamp(14px, 3.2vw, 16px);
        font-weight: 500;
        line-height: 1.5;
      }

      .unlock-panel {
        position: relative;
        display: grid;
        justify-items: center;
        min-height: 136px;
        margin-top: 34px;
        padding-top: 25px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.78);
        border-bottom: 0;
        border-radius: 42px 42px 0 0;
        background:
          radial-gradient(circle at 50% 105%, rgba(255, 255, 255, 0.76), transparent 37%),
          linear-gradient(180deg, rgba(255, 255, 255, 0.66), rgba(255, 255, 255, 0.34));
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.86),
          inset 0 -36px 42px rgba(237, 242, 252, 0.45),
          0 -18px 42px rgba(101, 112, 133, 0.08);
        backdrop-filter: blur(18px) saturate(1.2);
        -webkit-backdrop-filter: blur(18px) saturate(1.2);
      }

      .unlock-panel::before,
      .unlock-panel::after {
        content: "";
        position: absolute;
        bottom: -70px;
        width: 172px;
        height: 162px;
        border: 1px solid rgba(101, 112, 133, 0.18);
        border-radius: 50%;
      }

      .unlock-panel::before {
        left: -26px;
        border-left-color: transparent;
        border-bottom-color: transparent;
      }

      .unlock-panel::after {
        right: -26px;
        border-right-color: transparent;
        border-bottom-color: transparent;
      }

      .hint {
        color: #657085;
        font-size: 15px;
        font-weight: 500;
      }

      .password-form {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        width: min(286px, 100%);
        margin-top: 18px;
      }

      .password-input {
        min-width: 0;
        height: 46px;
        border: 1px solid rgba(201, 211, 231, 0.88);
        border-radius: 999px;
        outline: none;
        background: rgba(255, 255, 255, 0.86);
        color: var(--text);
        padding: 0 18px;
        font-size: 15px;
        font-weight: 700;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.92),
          0 10px 22px rgba(24, 32, 46, 0.08);
      }

      .password-input:focus {
        border-color: rgba(92, 124, 255, 0.68);
        box-shadow:
          0 0 0 4px rgba(92, 124, 255, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.92),
          0 10px 22px rgba(24, 32, 46, 0.08);
      }

      .enter-button {
        display: inline-grid;
        place-items: center;
        height: 46px;
        min-width: 72px;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(145deg, #6b7cff, #8bb5ff);
        color: #ffffff;
        cursor: pointer;
        font-weight: 900;
        box-shadow:
          0 12px 24px rgba(36, 88, 211, 0.18),
          inset 0 1px 0 rgba(255, 255, 255, 0.32);
        transition: transform 160ms ease, box-shadow 160ms ease;
      }

      .enter-button:hover {
        transform: translateY(-1px);
        box-shadow:
          0 16px 28px rgba(36, 88, 211, 0.22),
          inset 0 1px 0 rgba(255, 255, 255, 0.32);
      }

      .password-status {
        position: relative;
        z-index: 1;
        min-height: 18px;
        margin-top: 10px;
        color: #657085;
        font-size: 12px;
        font-weight: 700;
        text-align: center;
      }

      .password-status.error {
        color: #b42318;
      }


      .robot-svg {
        display: block;
        width: 100%;
        height: auto;
        overflow: visible;
        transform: scale(1.04);
        transform-origin: center bottom;
        filter:
          drop-shadow(0 18px 24px rgba(0, 0, 0, 0.38))
          drop-shadow(0 3px 8px rgba(107, 124, 255, 0.16));
      }

      @media (max-width: 380px) {
        body {
          padding: 14px;
        }

        .phone {
          border-radius: 42px;
          min-height: 604px;
        }

        .content {
          padding: 24px 20px 16px;
          grid-template-rows: minmax(326px, 1fr) auto auto;
        }

        .art {
          min-height: 330px;
        }

        .unlock-panel {
          min-height: 128px;
          margin-top: 28px;
        }

        .password-form {
          grid-template-columns: 1fr;
          width: min(240px, 100%);
        }
      }

      @media (max-height: 760px) {
        .phone {
          width: min(360px, calc(100vw - 24px));
          min-height: 594px;
        }

        .content {
          grid-template-rows: minmax(312px, 1fr) auto auto;
        }

        .art {
          min-height: 315px;
        }

        h1 {
          font-size: clamp(35px, 8.6vw, 46px);
        }

        p {
          margin-top: 10px;
        }

        .unlock-panel {
          min-height: 134px;
          margin-top: 24px;
        }
      }
    </style>

      const passwordForm = document.getElementById("password-form");
      const passwordStatus = document.getElementById("password-status");

      function resetUnlockPage() {
        passwordForm.reset();
        passwordStatus.classList.remove("error");
        passwordStatus.textContent = "Click Open to enter";
      }

      function goDashboard() {
        if (window.location.protocol === "file:" || window.location.pathname.endsWith("/home_unlock_preview.html")) {
          window.location.href = "index.html";
          return;
        }

        window.location.href = "/dashboard";
      }

      window.addEventListener("pageshow", () => {
        resetUnlockPage();
      });

      passwordForm.addEventListener("submit", (event) => {
        event.preventDefault();
        passwordStatus.classList.remove("error");
        passwordStatus.textContent = "Opening dashboard...";
        window.setTimeout(goDashboard, 180);
      });
    </script>
  </body>
</html>
